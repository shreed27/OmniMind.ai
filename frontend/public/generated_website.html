<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniMind.ai Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4895ef;
            --accent: #4ade80;
            --bg: #09090b;
            --panel: #18181b;
            --border: #27272a;
            --text: #f4f4f5;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }
        header {
            background-color: var(--panel);
            border-bottom: 2px solid var(--border);
            padding: 20px;
            text-align: center;
        }
        .logo {
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            color: var(--primary);
        }
        .hero {
            padding: 60px 20px;
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <header>
        <span class="logo">⚡ OMNIMIND.AI PORTAL</span>
    </header>
    <div class="hero">
        <h2 style="font-family: 'Press Start 2P', monospace; font-size: 20px;">SYSTEM LAUNCHED</h2>
        <p>Project query: "hy" has been compiled cleanly into this live HTML page by our autonomous corporate kernel.</p>
        <p style="color: var(--accent);">State: Live & Online on port 3000</p>
    </div>
</body>
</html>
