services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: omnimind
      POSTGRES_PASSWORD: omnimind
      POSTGRES_DB: omnimind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.23
    environment:
      NEO4J_AUTH: neo4j/omnimind
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  pgdata:
  neo4jdata:
  redisdata:
  qdrantdata:
